<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contenedor con Logo</title>
    <style>
        body {
            background-color: #cf2e2e;
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            /* max-width: 800px; */
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            width: 200px;
            height: 44px;
        }
        
        .titulo {
            margin-top: 20px;
            color: black;
        }
        
        .titulo h1 {
            font-size: 2.2em;
            font-weight: bold;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }
        
        .titulo p {
            font-size: 1.1em;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Trazado-520.svg" alt="Logo" class="logo">
        <div class="titulo">
            <h1>Título Principal</h1>
            <p>Este es el texto descriptivo en tamaño normal.</p>
        </div>
    </div>
</body>
</html>

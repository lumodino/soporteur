<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reloj pantalla completa</title>
  <style>
    :root {
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.18)),
        url('https://hortal.unirioja.es/fondoqrUR.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #ffffff;
    }

    .clock-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    #clock {
      font-size: clamp(6rem, 18vw, 16rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-shadow: var(--shadow);
      text-align: center;
      font-variant-numeric: tabular-nums;
      backdrop-filter: blur(2px);
      padding: 0.3em 0.55em;
      border-radius: 1rem;
      background: rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 640px) {
      #clock {
        letter-spacing: 0.02em;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="clock-wrap" aria-label="Reloj a pantalla completa">
    <div id="clock" role="timer" aria-live="polite">00:00:00</div>
  </main>

  <script>
    const clock = document.getElementById('clock');

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('es-ES', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      clock.textContent = time;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Buscador con autocompletado</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #cf2e2e;
      /* fondo solicitado */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-container {
      background: #ffffff;
      border-radius: 8px;
      padding: 24px 24px 16px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .search-logo {
      display: block;
      max-width: 220px;
      margin: 0 auto 16px;
    }

    .search-box {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 4px;
      border: 1px solid #cccccc;
      font-size: 16px;
      outline: none;
    }

    .search-input:focus {
      border-color: #cf2e2e;
      box-shadow: 0 0 0 2px rgba(207, 46, 46, 0.2);
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: #ffffff;
      border-radius: 4px;
      border: 1px solid #ddd;
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
    }

    .suggestion-item {
      padding: 8px 10px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #f2f2f2;
    }

    .suggestion-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .suggestion-summary {
      font-size: 13px;
      color: #555;
    }

    .results {
      margin-top: 12px;
      font-size: 14px;
    }

    .result-item {
      background: #f9f9f9;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }

    .result-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .result-summary {
      margin-bottom: 2px;
    }

    .result-link a {
      color: #cf2e2e;
      text-decoration: none;
    }

    .result-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .search-container {
        margin: 16px;
        padding: 16px 16px 10px;
      }
    }
  </style>
</head>

<body>

    <div class="search-box">
      <input type="text" id="search" class="search-input" placeholder="Escribe una palabra clave para buscar..."
        autocomplete="off" />
      <div id="suggestions" class="suggestions" style="display:none;"></div>
    </div>

    <div id="results" class="results"></div>

    // Normaliza textos eliminando acentos y pasando a minúsculas
    function normalizarTexto(texto) {
      return texto
        .normalize("NFD")               // Separa caracteres base y diacríticos[web:6]
        .replace(/\p{Diacritic}/gu, "") // Elimina diacríticos (acentos)[web:6]
        .toLowerCase()
        .trim();
    }

    function filtrarContenidos(termino) {
      const normalizado = normalizarTexto(termino);
      if (normalizado.length < 3) return [];

      return contenidos.filter((item) => {
        const campo = normalizarTexto(
          item.titulo + " " + item.resumen
        );
        return campo.includes(normalizado);
      });
    }

    const input = document.getElementById("search");
    const suggestionsDiv = document.getElementById("suggestions");
    const resultsDiv = document.getElementById("results");

    function renderSuggestions(lista) {
      if (!lista.length) {
        suggestionsDiv.style.display = "none";
        suggestionsDiv.innerHTML = "";
        return;
      }

      suggestionsDiv.innerHTML = "";
      lista.forEach((item) => {
        const div = document.createElement("div");
        div.className = "suggestion-item";

        const title = document.createElement("div");
        title.className = "suggestion-title";
        title.textContent = item.titulo;

        const summary = document.createElement("div");
        summary.className = "suggestion-summary";
        summary.textContent = item.resumen;

        div.appendChild(title);
        div.appendChild(summary);

        div.addEventListener("click", () => {
          window.open(item.url, "_blank");
        });

        suggestionsDiv.appendChild(div);
      });

      suggestionsDiv.style.display = "block";
    }

    function renderResults(lista) {
      resultsDiv.innerHTML = "";
      if (!lista.length) return;

      lista.forEach((item) => {
        const wrapper = document.createElement("div");
        wrapper.className = "result-item";

        const title = document.createElement("div");
        title.className = "result-title";
        title.textContent = item.titulo;

        const summary = document.createElement("div");
        summary.className = "result-summary";
        summary.textContent = item.resumen;

        const link = document.createElement("div");
        link.className = "result-link";
        link.innerHTML = `<a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.url}</a>`;

        wrapper.appendChild(title);
        wrapper.appendChild(summary);
        wrapper.appendChild(link);

        resultsDiv.appendChild(wrapper);
      });
    }

    input.addEventListener("input", () => {
      const valor = input.value;
      const resultados = filtrarContenidos(valor);
      //renderSuggestions(resultados);
      renderResults(resultados);
    });

    // Cerrar sugerencias si se hace clic fuera
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-box")) {
        suggestionsDiv.style.display = "none";
      }
    });
  </script>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscador con Autocompletado</title>
  <style>
    body { font-family: sans-serif; }
    .autocomplete {
      position: relative;
      width: 400px;
    }
    #searchInput {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    .autocomplete-items {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      border: 1px solid #d4d4d4;
      background: #fff;
      max-height: 240px;
      overflow-y: auto;
      z-index: 99;
    }
    .autocomplete-item {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .autocomplete-item:last-child {
      border-bottom: none;
    }
    .autocomplete-item strong { color: #1565c0; }
    .autocomplete-item:hover {
      background-color: #f1f1f1;
    }
    .item-title { font-weight: bold; }
    .item-summary { font-size: 0.9em; color: #666; }
  </style>
</head>
<body>

<h2>Buscador de Contenidos</h2>
<div class="autocomplete">
  <input type="text" id="searchInput" placeholder="Buscar por título o resumen...">
  <div id="autocomplete-list" class="autocomplete-items"></div>
</div>

<script>
// Array de contenidos: puedes agregar más elementos
const contenidos = [
  {
    titulo: "Introducción a JavaScript",
    resumen: "Aprende los conceptos básicos del lenguaje JavaScript y cómo usarlo en la web.",
    url: "https://ejemplo.com/js-intro"
  },
  {
    titulo: "Guía CSS Flexbox",
    resumen: "Descubre cómo crear layouts flexibles con CSS Flexbox.",
    url: "https://ejemplo.com/css-flexbox"
  },
  {
    titulo: "Tutorial HTML5",
    resumen: "Domina las etiquetas y la estructura de los documentos HTML5.",
    url: "https://ejemplo.com/html5"
  }
  // Agrega aquí más contenidos...
];

// Referencias
const input = document.getElementById('searchInput');
const autocompleteList = document.getElementById('autocomplete-list');

input.addEventListener('input', function() {
  const query = this.value.trim().toLowerCase();
  autocompleteList.innerHTML = '';
  if (query.length === 0) return;

  // Filtra contenidos por título o resumen
  const resultados = contenidos.filter(item =>
    item.titulo.toLowerCase().includes(query) ||
    item.resumen.toLowerCase().includes(query)
  );

  // Muestra sugerencias
  resultados.forEach(item => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    div.innerHTML = `
      <span class="item-title"><strong>${destacar(item.titulo, query)}</strong></span><br>
      <span class="item-summary">${destacar(item.resumen, query)}</span>
    `;
    div.onclick = () => window.open(item.url, '_blank');
    autocompleteList.appendChild(div);
  });
});

// Resalta la coincidencia en los resultados
function destacar(texto, termino) {
  if (!termino) return texto;
  const regex = new RegExp(`(${termino})`, 'gi');
  return texto.replace(regex, '<mark>$1</mark>');
}

// Cierra la lista si se hace clic fuera
document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete')) {
    autocompleteList.innerHTML = '';
  }
});
</script>

</body>
</html>
